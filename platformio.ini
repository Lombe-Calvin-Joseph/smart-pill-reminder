[env:nodemcuv2]
platform  = espressif8266
board     = nodemcuv2
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Library dependencies (PlatformIO will auto-download these)
lib_deps =
    adafruit/RTClib @ ^2.1.1
    blynkkk/Blynk @ ^1.3.2
    mathworks/ThingSpeak @ ^2.0.0
    arduino-libraries/NTPClient @ ^3.2.1

; Build flags
build_flags =
    -D BLYNK_PRINT=Serial
    -D BLYNK_NO_BUILTIN_LOGO
